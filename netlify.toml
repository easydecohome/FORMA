# FORMA Kitchens — static site, no build step
[build]
  publish = "."

# Long-ish cache for heavy assets (video, fonts, poster); HTML stays fresh
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
